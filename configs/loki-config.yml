# ─────────────────────────────────────────────────────────────────────────────
# Loki configuration — local dev (single-binary, filesystem storage)
# ─────────────────────────────────────────────────────────────────────────────
# For production, see https://grafana.com/docs/loki/latest/configure/
# This config is intentionally minimal: it gets you to "logs in Grafana"
# in under a minute without external dependencies.
# ─────────────────────────────────────────────────────────────────────────────

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

ruler:
  alertmanager_url: http://localhost:9093

# ─── Limits — keep them generous for local dev ─────────────────────────
limits_config:
  metric_aggregation_enabled: true
  # Allow JSON labels with high-cardinality test fields
  max_label_name_length: 1024
  max_label_value_length: 4096
  max_label_names_per_series: 30
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32

# ─── Pattern ingester — enables structured-log pattern detection ───────
pattern_ingester:
  enabled: true

# ─── Disable analytics reporting for local dev ─────────────────────────
analytics:
  reporting_enabled: false
