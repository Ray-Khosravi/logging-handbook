# ─────────────────────────────────────────────────────────────────────────────
# Grafana datasource provisioning
# ─────────────────────────────────────────────────────────────────────────────
# Auto-configures Loki as a datasource when Grafana starts up, so you can
# open the Explore tab and immediately query logs — no manual setup needed.
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    editable: true
    jsonData:
      timeout: 60
      maxLines: 5000
      # Derived fields let you pivot from a log line to a trace.
      # If your structured logs carry a `trace_id` field, this turns it
      # into a clickable link.
      derivedFields:
        - name: TraceID
          matcherRegex: '"trace_id"\s*:\s*"([^"]+)"'
          url: '$${__value.raw}'
          datasourceUid: tempo
